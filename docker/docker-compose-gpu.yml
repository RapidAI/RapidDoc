services:
  rapid-doc-server:
    container_name: rapid-doc-server
    image: hzkitty/rapid-doc:0.9.8-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8888:8888"
    environment:
      - TZ=${TIMEZONE:-UTC}
      #- MINERU_DEVICE_MODE=cuda:0
      #- PADDLEOCRVL_VERSION=v1.6
      #- PADDLEOCRVL_VL_REC_BACKEND=vllm-server
      #- PADDLEOCRVL_VL_VL_REC_SERVER_URL=http://localhost:8118/v1
    restart: always
